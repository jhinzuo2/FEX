name: Wine DLL artifacts
on:
  push:
    branches:
      - main
env:
  BUILD_TYPE: Release
jobs:
  wine_dll_artifacts:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: '0'
        fetch-tags: 'true'

    - name: Install llvm-mingw
      run: |
        set -e
        cd "$HOME"
        curl -L -o llvm-mingw.tar.xz \
          "https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-aarch64.tar.xz"
        tar xf llvm-mingw.tar.xz
        mv llvm-mingw-*-aarch64 llvm-mingw
        echo "$HOME/llvm-mingw/bin" >> "$GITHUB_PATH"

    - name: Checkout Submodules
      run: |
        git submodule sync --recursive
        git submodule update --init --depth 1

    - name: Clean install directory
      run: rm -Rf install

    - name: Build (wow64)
      uses: ./.github/workflows/wine_build
      with:
        target: wow64

    - name: Build (arm64ec)
      uses: ./.github/workflows/wine_build
      with:
        target: arm64ec

    - name: Upload libraries
      uses: actions/upload-artifact@v6
      timeout-minutes: 1
      with:
        overwrite: true
        name: wine_dll_artifacts
        path: |
          ${{ github.workspace }}/install/usr/lib/wine/aarch64-windows/lib*.dll
          ${{ github.workspace }}/install/usr/lib/wine/aarch64-unix/lib*.so
        retention-days: 60
        compression-level: 9
